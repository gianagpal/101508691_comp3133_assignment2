<div class="container mt-5">
  <div class="card p-4 shadow">
    <h2 class="text-center mb-4">Signup</h2>

    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <div class="mb-3">
      <input
        class="form-control"
        placeholder="Username"
        [(ngModel)]="username"
        name="username"
      />
    </div>

    <div class="mb-3">
      <input
        class="form-control"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
      />
    </div>

    <div class="mb-3">
      <input
        type="password"
        class="form-control"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
      />
    </div>

    <button type="button" class="btn btn-success w-100" (click)="onSignup()">
      Signup
    </button>

    <div class="text-center mt-3">
      <a routerLink="/login">Back to Login</a>
    </div>
  </div>
</div>
